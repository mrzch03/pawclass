name: Build & Deploy PawClass

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to K8s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K8S_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            kubectl rollout restart deployment/pawclass -n clawbox
            kubectl rollout status deployment/pawclass -n clawbox --timeout=120s

      - name: Sync knowledge-base
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K8S_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            POD=$(kubectl get pod -n clawbox -l app=pawclass -o jsonpath='{.items[0].metadata.name}')
            kubectl exec -n clawbox $POD -- sh -c '
              cd /data/knowledge-base &&
              if [ -d .git ]; then
                git pull origin main
              else
                git clone https://${{ secrets.KB_GITHUB_TOKEN }}@github.com/mrzch03/teachclaw-kb.git . ||
                git clone https://github.com/mrzch03/teachclaw-kb.git .
              fi
            ' || echo "KB sync skipped (will use existing data)"
